apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: backend
    environment: production
spec:
  selector:
    app: backend
    version: blue   # switch to 'green' during blue-green cutover
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service-blue
  labels:
    app: backend
    version: blue
    environment: production
spec:
  selector:
    app: backend
    version: blue
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service-green
  labels:
    app: backend
    version: green
    environment: production
spec:
  selector:
    app: backend
    version: green
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service-canary
