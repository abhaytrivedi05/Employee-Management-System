apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment-blue
  labels:
    app: backend
    version: blue
    environment: production
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
      version: blue
  template:
    metadata:
      labels:
        app: backend
        version: blue
        environment: production
    spec:
      containers:
        - name: backend
          image: empmgmtacr2024.azurecr.io/employee-management-backend:v1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "azure"
            - name: AZURE_SQL_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: azure-sql-url
            - name: AZURE_SQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: azure-sql-username
            - name: AZURE_SQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: azure-sql-password
            - name: DDL_AUTO
              value: "update"
            - name: MONGO_AUTO_CONFIG
              value: "org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration"
            - name: CORS_ORIGINS
              value: "*"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
