apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: employee-management
  labels:
    app: backend
data:
  # Application configuration
  SPRING_PROFILES_ACTIVE: "azure"
  DDL_AUTO: "update"
  CORS_ORIGINS: "http://frontend-service:3001,http://localhost:3000"
  
  # Logging configuration
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_EXAMPLE_EMPLOYEEMANAGEMENT: "DEBUG"