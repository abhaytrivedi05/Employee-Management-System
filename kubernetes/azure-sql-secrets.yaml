apiVersion: v1
kind: Secret
metadata:
  name: azure-sql-secrets
  namespace: employee-management
  labels:
    app: backend
type: Opaque
stringData:
  # Azure SQL Connection Details - UPDATE THESE WITH YOUR ACTUAL VALUES
  AZURE_SQL_URL: "jdbc:sqlserver://YOUR_SERVER.database.windows.net:1433;database=YOUR_DATABASE;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;"
  AZURE_SQL_USERNAME: "YOUR_USERNAME@YOUR_SERVER"
  AZURE_SQL_PASSWORD: "YOUR_PASSWORD"
  SPRING_PROFILES_ACTIVE: "azure"
  DDL_AUTO: "update"
  
  # JWT secret for Spring Security token signing - CHANGE THIS
  JWT_SECRET: "change-this-to-a-random-32-char-string"