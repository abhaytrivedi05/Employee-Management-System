# Supabase Postgres Secrets Template
# DO NOT commit real values. Use kubectl to create the secret:
#
# kubectl create secret generic backend-secrets \
#   --from-literal=db-url="jdbc:postgresql://db.xckjxmcoofrgdqatevfo.supabase.co:5432/postgres" \
#   --from-literal=db-username="postgres" \
#   --from-literal=db-password="<YOUR_SUPABASE_DB_PASSWORD>" \
#   --from-literal=jwt-secret="<RANDOM_SECRET_32_CHARS>"
#
# Your Supabase DB password is in:
#   Supabase Dashboard → Project Settings → Database → Connection string / Password
#
# The JDBC URL format for Supabase Postgres (Session mode, port 5432):
#   jdbc:postgresql://db.<PROJECT_REF>.supabase.co:5432/postgres
#
# For connection pooling (Transaction mode, port 6543):
#   jdbc:postgresql://<PROJECT_REF>.pooler.supabase.com:6543/postgres?pgbouncer=true
#
# Project ref: xckjxmcoofrgdqatevfo

apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  labels:
    app: backend
type: Opaque
stringData:
  # Supabase Postgres — direct connection (use port 5432 for JPA/Hibernate)
  db-url: "jdbc:postgresql://db.xckjxmcoofrgdqatevfo.supabase.co:5432/postgres"
  db-username: "postgres"
  db-password: "REPLACE_WITH_SUPABASE_DB_PASSWORD"

  # JWT secret for Spring Security token signing
  jwt-secret: "REPLACE_WITH_RANDOM_JWT_SECRET_MIN_32_CHARS"
